<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#121820"/>
    </linearGradient>
    <linearGradient id="teal" x1="8" y1="8" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>
  <!-- Rounded app tile -->
  <rect x="1" y="1" width="30" height="30" rx="8" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="7.5" stroke="rgba(45,212,191,0.22)" stroke-width="1"/>
  <!-- Pulse rings (signal / research pulse) -->
  <circle cx="16" cy="16" r="10" stroke="url(#teal)" stroke-width="1.25" opacity="0.28"/>
  <circle cx="16" cy="16" r="6.5" stroke="url(#teal)" stroke-width="1.5" opacity="0.55"/>
  <!-- Center core -->
  <circle cx="16" cy="16" r="3" fill="url(#teal)"/>
  <!-- Subtle highlight on core -->
  <circle cx="15" cy="15" r="1" fill="#F0FDFA" opacity="0.55"/>
</svg>
